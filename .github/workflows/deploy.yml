name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # またはお使いのデフォルトブランチ名 (master 等) に変更してください

# GITHUB_TOKEN のパーミッションを設定
permissions:
  contents: read
  id-token: write
  pages: write

# クラッシュ回避のため、同時実行されるジョブをキャンセル
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite のデフォルト出力先ディレクトリである dist を指定します
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
